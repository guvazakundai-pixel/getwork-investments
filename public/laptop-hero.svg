<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" fill="none">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071B45"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#071B45" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Ambient glow behind laptop -->
  <ellipse cx="250" cy="200" rx="220" ry="180" fill="#2563EB" opacity="0.06" filter="url(#glow)"/>
  <ellipse cx="250" cy="180" rx="160" ry="140" fill="#1D4ED8" opacity="0.04" filter="url(#glow)"/>

  <!-- Base shadow -->
  <ellipse cx="250" cy="340" rx="200" ry="20" fill="#071B45" opacity="0.08" filter="url(#glow)"/>

  <g filter="url(#shadow)">
    <!-- Lid / Screen -->
    <rect x="95" y="20" width="310" height="230" rx="16" fill="url(#screenGrad)" stroke="#1D4ED8" stroke-width="1.5" opacity="0.95"/>
    <!-- Screen bezel inner -->
    <rect x="108" y="33" width="284" height="200" rx="8" fill="#0f172a"/>

    <!-- Screen content - code with blue glow -->
    <rect x="125" y="55" width="110" height="5" rx="2.5" fill="#2563EB" opacity="0.5"/>
    <rect x="125" y="70" width="180" height="5" rx="2.5" fill="#2563EB" opacity="0.3"/>
    <rect x="125" y="85" width="140" height="5" rx="2.5" fill="#2563EB" opacity="0.45"/>
    <rect x="125" y="100" width="200" height="5" rx="2.5" fill="#2563EB" opacity="0.25"/>
    <rect x="125" y="115" width="120" height="5" rx="2.5" fill="#2563EB" opacity="0.5"/>
    <rect x="125" y="130" width="160" height="5" rx="2.5" fill="#2563EB" opacity="0.3"/>
    <rect x="125" y="145" width="100" height="5" rx="2.5" fill="#2563EB" opacity="0.45"/>
    <rect x="125" y="160" width="190" height="5" rx="2.5" fill="#2563EB" opacity="0.25"/>

    <!-- Glowing checkmark on screen -->
    <circle cx="320" cy="125" r="28" fill="#2563EB" opacity="0.1"/>
    <path d="M308 125l8 8 16-16" stroke="#2563EB" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

    <!-- Webcam -->
    <circle cx="250" cy="26" r="3" fill="#2563EB" opacity="0.4"/>

    <!-- Hinge -->
    <rect x="115" y="248" width="270" height="10" rx="5" fill="#071B45"/>
    <rect x="115" y="248" width="270" height="3" rx="1.5" fill="#2563EB" opacity="0.15"/>
  </g>

  <!-- Base / Keyboard deck -->
  <path d="M60 258h380l-25 80H85l-25-80z" fill="url(#bodyGrad)" rx="4"/>
  <path d="M60 258h380" stroke="#2563EB" stroke-width="1" opacity="0.1"/>

  <!-- Inner keyboard area -->
  <rect x="90" y="270" width="320" height="35" rx="6" fill="#0a1628" opacity="0.4"/>

  <!-- Keyboard keys row 1 -->
  <g opacity="0.35">
    <g fill="#2563EB">
      <rect x="98" y="274" width="17" height="9" rx="2"/>
      <rect x="119" y="274" width="17" height="9" rx="2"/>
      <rect x="140" y="274" width="17" height="9" rx="2"/>
      <rect x="161" y="274" width="17" height="9" rx="2"/>
      <rect x="182" y="274" width="17" height="9" rx="2"/>
      <rect x="203" y="274" width="17" height="9" rx="2"/>
      <rect x="224" y="274" width="17" height="9" rx="2"/>
      <rect x="245" y="274" width="17" height="9" rx="2"/>
      <rect x="266" y="274" width="17" height="9" rx="2"/>
      <rect x="287" y="274" width="17" height="9" rx="2"/>
      <rect x="308" y="274" width="17" height="9" rx="2"/>
      <rect x="329" y="274" width="17" height="9" rx="2"/>
      <rect x="350" y="274" width="17" height="9" rx="2"/>
      <rect x="371" y="274" width="17" height="9" rx="2"/>
    </g>
  </g>

  <!-- Keyboard keys row 2 -->
  <g opacity="0.2">
    <g fill="#2563EB">
      <rect x="98" y="287" width="17" height="9" rx="2"/>
      <rect x="119" y="287" width="17" height="9" rx="2"/>
      <rect x="140" y="287" width="17" height="9" rx="2"/>
      <rect x="161" y="287" width="17" height="9" rx="2"/>
      <rect x="182" y="287" width="17" height="9" rx="2"/>
      <rect x="203" y="287" width="17" height="9" rx="2"/>
      <rect x="224" y="287" width="17" height="9" rx="2"/>
      <rect x="245" y="287" width="17" height="9" rx="2"/>
      <rect x="266" y="287" width="17" height="9" rx="2"/>
      <rect x="287" y="287" width="17" height="9" rx="2"/>
      <rect x="308" y="287" width="17" height="9" rx="2"/>
      <rect x="329" y="287" width="17" height="9" rx="2"/>
      <rect x="350" y="287" width="17" height="9" rx="2"/>
      <rect x="371" y="287" width="17" height="9" rx="2"/>
    </g>
  </g>

  <!-- Trackpad -->
  <rect x="220" y="304" width="60" height="16" rx="4" fill="#071B45" opacity="0.3"/>

  <!-- Front edge lighting -->
  <path d="M60 258h380" stroke="#2563EB" stroke-width="0.5" opacity="0.08"/>
</svg>
